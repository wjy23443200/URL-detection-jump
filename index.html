<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>线路自动分配中...</title>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; padding-top: 80px; }
    .highlight { color: #e53935; font-weight: bold; }
  </style>
</head>

<body>
  <h1>正在自动为您匹配可用线路...</h1>
  <p class="highlight">请稍候 1~3 秒</p>
  <p id="status">初始化中...</p>

<script>
const ua = navigator.userAgent;

if (/MicroMessenger|QQ\/|baiduboxapp|QQMail/i.test(ua)) {
  document.body.innerHTML =
    '<h1>⚠ 请用浏览器打开</h1>' +
    '<p>微信/QQ/百度内不支持加速跳转，请点击右上角“...”选择“浏览器打开”。</p>';
} else {

  const urls = [
    "https://www.renyimen.sbs",
    "https://renyimen.sbs",
    "https://www.yiciyuan.top",
    "https://wjy23443200.top",
    "https://www.wjy23443200.top",
    "https://renyimen.cfd",
    "https://yiciyuan.top",
    "https://wjy23443200.link",
    "https://www.wjy23443200.link"
  ];

  function testUrl(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();

      const timer = setTimeout(() => {
        img.onload = null;
        img.onerror = null;
        reject(url);
      }, 4000);

      img.onload = () => {
        clearTimeout(timer);
        resolve(url);
      };

      img.onerror = () => {
        clearTimeout(timer);
        reject(url);
      };

      img.src = url + "/favicon.ico?v=" + Date.now();
    });
  }

  async function findBest() {
    document.getElementById("status").innerText =
      "正在检测可用线路...";

    try {
      const firstAvailable = await Promise.any(
        urls.map(testUrl)
      );

      document.getElementById("status").innerText =
        "已匹配可用线路，正在跳转...";

      setTimeout(() => {
        window.location.href = firstAvailable;
      }, 300);

    } catch (e) {
      document.getElementById("status").innerText =
        "当前网络下所有线路均不可用，请尝试切换 WiFi/流量并刷新，或联系客服获取最新地址。";
    }
  }

  findBest();
}
</script>
</body>
</html>
